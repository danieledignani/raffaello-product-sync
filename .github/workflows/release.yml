name: Build and release plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build and release plugin
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update plugin header version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s/^\(\s*\*\s*Version:\s*\).*/\1$VERSION/" raffaello-product-sync.php
          sed -i "s/define( 'RPS_VERSION', '.*' )/define( 'RPS_VERSION', '$VERSION' )/" raffaello-product-sync.php

      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="raffaello-product-sync"
          ZIP_NAME="${PLUGIN_SLUG}.zip"
          mkdir dist
          zip -r "dist/$ZIP_NAME" . -x "*.git*" "*.github*" "dist/*" "*.log"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: dist/raffaello-product-sync.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-changelog:
    name: Update CHANGELOG and JSON metadata
    needs: build
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CHANGELOG.md and JSON
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TODAY=$(date +"%Y-%m-%d")
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          JSON_PATH=".github/update-metadata/raffaello-product-sync.json"

          # Trova il tag precedente
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | head -n 1)
          echo "Previous tag: $PREV_TAG"

          # Genera le voci changelog dai commit
          if [ -n "$PREV_TAG" ]; then
            ENTRIES=$(git log "$PREV_TAG..HEAD" --pretty=format:"- %s" --no-merges | grep -v "^- Update JSON to version" | grep -v "^- Release ")
          else
            ENTRIES="- Versione iniziale"
          fi

          # Crea la nuova sezione changelog
          NEW_SECTION=$(cat <<'SECTION_END'
          ## [__VERSION__] - __TODAY__

          ### Modifiche
          SECTION_END
          )
          NEW_SECTION=$(echo "$NEW_SECTION" | sed "s/__VERSION__/$VERSION/g" | sed "s/__TODAY__/$TODAY/g" | sed 's/^          //')
          NEW_SECTION=$(printf "%s\n%s" "$NEW_SECTION" "$ENTRIES")

          # Aggiorna CHANGELOG.md incrementalmente
          if [ -f "CHANGELOG.md" ]; then
            awk -v section="$NEW_SECTION" 'BEGIN{found=0} /^## \[/ && !found { print section; print ""; found=1 } { print }' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            printf "# Changelog\n\nTutte le modifiche rilevanti al plugin sono documentate in questo file.\n\n%s\n" "$NEW_SECTION" > CHANGELOG.md
          fi

          # Genera HTML dal CHANGELOG.md per il JSON (ultime 3 versioni)
          CHANGELOG_HTML=$(awk '
            /^## \[/ { n++; if (n>3) exit; if (in_list) print "</ul>"; in_list=0; gsub(/^## \[/, ""); gsub(/\] - /, " ("); gsub(/$/, ")"); print "<h4>" $0 "</h4>"; next }
            /^### / { if (in_list) print "</ul>"; gsub(/^### /, ""); print "<h5>" $0 "</h5><ul>"; in_list=1; next }
            /^- / { gsub(/^- /, ""); print "<li>" $0 "</li>"; next }
          END { if (in_list) print "</ul>" }
          ' CHANGELOG.md | jq -Rs .)

          # Scrivi il JSON metadata
          jq -n \
            --arg name "Raffaello Product Sync" \
            --arg version "$VERSION" \
            --arg download_url "https://github.com/danieledignani/raffaello-product-sync/releases/download/$VERSION/raffaello-product-sync.zip" \
            --arg homepage "https://github.com/danieledignani/raffaello-product-sync" \
            --arg last_updated "$TIMESTAMP" \
            --argjson changelog "$CHANGELOG_HTML" \
            '{
              name: $name,
              version: $version,
              download_url: $download_url,
              homepage: $homepage,
              requires: "5.8",
              tested: "6.8",
              requires_php: "7.4",
              last_updated: $last_updated,
              upgrade_notice: "Aggiornamento automatico da GitHub",
              author: "Daniele Dignani",
              author_homepage: "https://github.com/danieledignani",
              sections: {
                description: "Sincronizzazione prodotti WooCommerce tra più store via REST API — sync completo (prodotti, variazioni, categorie, tag, brand, attributi, immagini, meta), bulk sync asincrono con progress bar, force sync per store, logging su database con viewer filtri ed export CSV, aggiustamento prezzi per store, test suite integrata, migrazione URL, aggiornamento automatico da GitHub.",
                installation: "Carica il plugin tramite il pannello Plugin > Aggiungi nuovo o scompatta nella cartella wp-content/plugins/",
                changelog: $changelog
              }
            }' > "$JSON_PATH"

      - name: Commit and push
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add CHANGELOG.md .github/update-metadata/raffaello-product-sync.json
          git commit -m "Release $VERSION: aggiorna CHANGELOG.md e JSON metadata" || echo "Nessuna modifica."
          git push origin master
